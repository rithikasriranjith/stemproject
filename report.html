```html
<!DOCTYPE html>
<html>
<head>
<title>Report</title>
<link rel="stylesheet" href="style.css">

<script>

function loadReport(){

let wqi = localStorage.getItem("wqi");

let status="";
let cls="";

if(wqi>=80){status="Excellent"; cls="good";}
else if(wqi>=50){status="Moderate"; cls="medium";}
else{status="Poor"; cls="bad";}

document.getElementById("result").innerHTML=
"WQI Score: "+wqi+"<br>Status: <span class='"+cls+"'>"+status+"</span>";
}

</script>

</head>

<body onload="loadReport()">

<nav>
<a href="index.html">Home</a>
<a href="analysis.html">Analysis</a>
<a href="report.html">Report</a>
<a href="about.html">About</a>
</nav>

<div class="report-box">

<h2>Water Quality Report</h2>

<p id="result"></p>

<p>
80–100: Excellent | 50–79: Moderate | Below 50: Poor
</p>

</div>

</body>
</html>
